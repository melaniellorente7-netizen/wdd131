<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Melanie Llorente">
    <meta name="description" content="Page with information of Uruguay the country I live in, this is part of assignment of week 3">
    <title>Country Page: Uruguay - WDD 131</title>
     <link rel="stylesheet" href="styles/place.css">
     <link rel="stylesheet" href="styles/place-large.css"
     <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Uruguay</h1>
    </header>
    <main>
        <div class="hero">
        <picture>
            <source srcset="images/hands-large.webp" media="(min-width: 1000px )" >
            <source  srcset="images/hands-medium.webp" media="(min-width: 500px )" >
            <img src="images/hands-small.webp" alt="Hands statue of Punta del Este" width="1500" height="750">
        </picture>
    </div>
    <section class="card data-card">
        <div class="card-title">
            <h2>Data</h2>
        </div>    
          <div class="card-body">
                <table class="info-table">
                    <tr><td class="label">Area:</td><td class="value">587,041 sq km</td></tr>
                    <tr><td class="label">Population:</td><td class="value">27,691,018</td></tr>
                    <tr><td class="label">Capital:</td><td class="value">Antananarivo</td></tr>
                    <tr><td class="label">Languages:</td><td class="value">Malagasy, French</td></tr>
                    <tr><td class="label">Currency:</td><td class="value">Malagasy Ariary</td></tr>
                    <tr><td class="label">Time Zone:</td><td class="value">UTC+3</td></tr>
                    <tr><td class="label">Calling Code:</td><td class="value">+261</td></tr>
                    <tr><td class="label">Internet TLD:</td><td class="value">.mg</td></tr>
                </table>
            </div>
        </section>

        <section class="card weather-card">
           <div class="card-title">
            <h2>Weather</h2>
    
        </div>  
           <div class="card-body">
                <div class="mobile-weather-icon">
                    <img src="images/weather.svg" alt="weather icon" class="weather-icon">
                </div>
                <table class="info-table">
                    <tr><td class="label">Temperature:</td><td class="value">10 °C</td></tr>
                    <tr><td class="label">Conditions:</td><td class="value">Partly Cloudy</td></tr>
                    <tr><td class="label">Wind:</td><td class="value">5 km/h</td></tr>
                    <tr><td class="label">Wind Chill:</td><td class="value" id="wind-chill">9.8 °C</td></tr>
                </table>
            </div>
        </section>
    </main>
    <footer>
         <p>©<span id="currentyear"></span> Melanie Llorente - Uruguay</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
