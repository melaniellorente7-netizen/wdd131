<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is the Product Review Form activity from week 05 of the WDD131 class">
    <meta name="author" content="Melanie Llorente">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="product-review">
            <div class="form-group">
                <label for="product-name">Product Name</label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Choose a Product ...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Overall Rating</label>
                <div class="rating-container">
                    <label class="radio-label">
                        <input type="radio" id="rating-1" name="overallRating" value="1" required>
                        <span>☆<br>1</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" id="rating-2" name="overallRating" value="2" required>
                        <span>☆☆<br>2</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" id="rating-3" name="overallRating" value="3" required>
                        <span>☆☆☆<br>3</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" id="rating-4" name="overallRating" value="4" required>
                        <span>☆☆☆☆<br>4</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" id="rating-5" name="overallRating" value="5" required>
                        <span>☆☆☆☆☆<br>5</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label for="install-date">Date of Installation</label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

            <div class="form-group">
                <label>Which features did you find useful in the product? <em>(Check all that apply)</em></label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="feature-durability" name="features" value="durability">
                        Durability</label>
                    <label><input type="checkbox" id="feature-ease" name="features" value="ease-of-use"> Ease of
                        Use</label>
                    <label><input type="checkbox" id="feature-performance" name="features" value="performance">
                        Performance</label>
                    <label><input type="checkbox" id="feature-design" name="features" value="design"> Design</label>
                </div>
                <div class="form-group">
                    <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
                    <textarea id="written-review" name="written-review" rows="5"></textarea>
                </div>
                <div class="form-grous">
                    <label for="user-name">Your Name <span class="optional">(Optional)</span></label>
                    <input type="text" id="user-name" name="userName">
                </div>
            </div>

            <input type="submit" value="Post Review" class="submit-button">

        </form>
    </main>



    <footer>
        <p>©<span id="currentyear"></span> Melanie Llorente - Uruguay</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
