<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add a new culinary creation to your digital cookbook collection.">
    <meta name="author" content="Melanie Llorente">
    <title>Add Recipe | My Digital Cookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/large.css">
    <script src="scripts/recipes.js" defer></script>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="mycookbook.html" class="logo">My Digital Cookbook</a>
            <button id="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            </button>
            <nav id="navigation-menu">
                <ul>
                    <li><a href="mycookbook.html">Home</a></li>
                    <li><a href="add-recipe.html" class="active">Add Recipe</a></li>
                    <li><a href="all-recipes.html">My Recipes</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="form-page-container">
        <section class="form-section">
            <h2>Add a New Recipe</h2>
            <p>Fill out the fields below to securely store your recipe in your local database.</p>
            
            <form id="recipe-form" class="styled-form">
                <div class="form-group">
                    <label for="recipe-title">Recipe Title <span class="required">*</span></label>
                    <input type="text" id="recipe-title" name="title" placeholder="e.g., Grandma's Secret Pasta" required>
                </div>

                <div class="form-group">
                    <label for="recipe-category">Category <span class="required">*</span></label>
                    <select id="recipe-category" name="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch/Dinner</option>
                        <option value="Desserts">Desserts</option>
                        <option value="Snacks">Snacks</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="recipe-image">Image URL</label>
                    <input type="url" id="recipe-image" name="image" placeholder="https://example.com/photo.jpg">
                    <small class="form-hint">Leave blank to use a default culinary placeholder image.</small>
                </div>

                <div class="form-group">
                    <label for="recipe-ingredients">Ingredients <span class="required">*</span></label>
                    <textarea id="recipe-ingredients" name="ingredients" rows="5" placeholder="Enter ingredients separated by commas (e.g., 200g Pasta, 2 Eggs, Salt)" required></textarea>
                </div>

                <div class="form-group">
                    <label for="recipe-instructions">Step-by-Step Instructions <span class="required">*</span></label>
                    <textarea id="recipe-instructions" name="instructions" rows="6" placeholder="Describe how to prepare this dish..." required></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">Save to My Collection</button>
                </div>
            </form>
            
            <div id="form-feedback" class="feedback-message hidden" role="alert"></div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 | My Digital Cookbook | WDD131 Project</p>
        </div>
    </footer>

</body>
</html>
