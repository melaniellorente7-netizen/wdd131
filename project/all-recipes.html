<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and search your entire personal collection of culinary recipes.">
    <meta name="author" content="Melanie Llorente">
    <title>My Collection | My Digital Cookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/large.css">
    <script src="scripts/recipes.js" defer></script>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="mycookbook.html" class="logo">My Digital Cookbook</a>
            <button id="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            </button>
            <nav id="navigation-menu">
                <ul>
                    <li><a href="mycookbook.html">Home</a></li>
                    <li><a href="add-recipe.html">Add Recipe</a></li>
                    <li><a href="all-recipes.html" class="active">My Recipes</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="collection-header-section">
            <h2>Your Personal Collection</h2>
            <p>Everything you've saved, neatly organized in one digital space.</p>
            
            <div class="filter-container">
                <label for="category-filter">Filter by Category:</label>
                <select id="category-filter">
                    <option value="all">Show All Recipes</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch/Dinner</option>
                    <option value="Desserts">Desserts</option>
                    <option value="Snacks">Snacks</option>
                </select>
            </div>
        </section>

        <section class="collection-grid-section">
            <div id="full-collection-grid" class="recipes-grid">
                <div class="loading-status">
                    <p>Loading your culinary library...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 | My Digital Cookbook | WDD131 Project</p>
        </div>
    </footer>

</body>
</html>
